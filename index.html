<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viral TON Social</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <h2>⚡ ViralTON</h2>
      <p class="sub">Earn • Post • Like • Withdraw TON</p>
    </div>

    <div class="wallet">
      <div>💳 <span id="credits">0</span></div>
      <div>💰 <span id="ton">0</span></div>
    </div>
  </div>

  <!-- FEED -->
  <div id="feed" class="page active"></div>

  <!-- CREATE BUTTON (FLOAT) -->
  <button class="fab" onclick="openCreate()">＋</button>

  <!-- CREATE MODAL -->
  <div id="createModal" class="modal hidden">
    <div class="modal-content">

      <h3>Create Post</h3>

      <select id="category">
        <option>Crypto</option>
        <option>Music</option>
        <option>Sport</option>
        <option>Entertainment</option>
        <option>Game</option>
      </select>

      <input id="title" placeholder="Title">
      <textarea id="desc" placeholder="Write something..."></textarea>

      <input type="file" id="image">

      <button onclick="publishPost()">🚀 Publish (1 Credit)</button>
      <button class="close" onclick="closeCreate()">Close</button>

      <p id="msg"></p>

    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button onclick="showFeed()">🏠</button>
    <button onclick="showTasks()">🎯</button>
    <button onclick="showStore()">🛒</button>
    <button onclick="showProfile()">👤</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
